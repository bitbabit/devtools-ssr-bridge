name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Build and publish @bitbabit/devtools-ssr-bridge
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package.json
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(npm pkg get version | tr -d '"')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Git tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f bin/setup.mjs

      - name: Verify npm authentication
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is missing. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run publish
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
