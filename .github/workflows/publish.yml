# Publishes when you publish a GitHub Release, or via Actions → Run workflow.
#
# REQUIRED ON NPM (one-time): https://www.npmjs.com/package/@bitbabit/devtools-ssr-bridge/access
#   → Publishing access → Trusted publishing → GitHub Actions
#   → Repository: bitbabit/devtools-ssr-bridge
#   → Workflow filename: publish.yml
#   → Environment: (leave empty)
# Without this, npm publish fails with 403 even if NPM_TOKEN passes npm whoami.

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Build and publish @bitbabit/devtools-ssr-bridge
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package.json
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(npm pkg get version | tr -d '"')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Git tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f bin/setup.mjs

      - name: Check version not already on npm
        id: version_check
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if npm view "@bitbabit/devtools-ssr-bridge@${VERSION}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already on npm — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Trusted Publishing / OIDC)
        if: steps.version_check.outputs.already_published != 'true'
        run: |
          VERSION="${{ steps.version_check.outputs.version }}"
          echo "## Publish @bitbabit/devtools-ssr-bridge@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          set -o pipefail
          npm publish --provenance --access public 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          exit "${PIPESTATUS[0]}"
